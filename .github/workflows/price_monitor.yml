name: Price Monitor

on:
  schedule:
    - cron: '0 * * * *'  # 매시간 정각 실행 (UTC 기준, KST +9h)
  workflow_dispatch:       # 수동 실행 가능

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Google credentials
        run: |
          echo "${{ secrets.GOOGLE_OAUTH_CREDENTIALS }}" | base64 -d > oauth-credentials.json
          echo "${{ secrets.GOOGLE_OAUTH_TOKEN }}" | base64 -d > token.json

      - name: Run price monitor
        env:
          DOMEGGOOK_API_KEY: ${{ secrets.DOMEGGOOK_API_KEY }}
          NAVER_COMMERCE_CLIENT_ID: ${{ secrets.NAVER_COMMERCE_CLIENT_ID }}
          NAVER_COMMERCE_CLIENT_SECRET: ${{ secrets.NAVER_COMMERCE_CLIENT_SECRET }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_FILE: oauth-credentials.json
        run: python "@price_monitor.py" --once

      - name: Update Google token (refresh 후 재저장)
        if: always()
        run: |
          if [ -f token.json ]; then
            NEW_TOKEN=$(base64 -w 0 token.json)
            echo "::notice::token.json이 갱신되었습니다. 필요시 GOOGLE_OAUTH_TOKEN Secret을 업데이트하세요."
          fi
